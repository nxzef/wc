name: Build Mac Desktop App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-13
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Mac DMG
        run: |
          ./gradlew :composeApp:packageDmg \
            --no-daemon \
            --stacktrace \
            -Pandroid.sdk.suppress=true \
            -x :androidApp:assembleDebug \
            -x :androidApp:assembleRelease \
            -x :composeApp:compileKotlinAndroid \
            -x :composeApp:compileDebugKotlin \
            -x :composeApp:compileReleaseKotlin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeddingClouds-Mac
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 30