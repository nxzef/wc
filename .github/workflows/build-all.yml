name: Build All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: mac-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: mac-gradle-
      - run: chmod +x gradlew
      - name: Build Mac DMG
        run: |
          ./gradlew :composeApp:packageDmg --no-daemon \
            -x :androidApp:assembleDebug \
            -x :androidApp:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: windows-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: windows-gradle-
      - name: Build Windows MSI
        run: ./gradlew :composeApp:packageMsi --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: linux-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: linux-gradle-
      - run: chmod +x gradlew
      - name: Install RPM tools
        run: sudo apt-get install -y rpm
      - name: Build Linux packages
        run: ./gradlew :composeApp:packageDeb :composeApp:packageRpm :composeApp:createDistributable --no-daemon
      - name: Create tar.gz for Arch and other distros
        run: |
          VER=$(grep -oP 'packageVersion\s*=\s*"\K[^"]+' composeApp/build.gradle.kts | head -1)
          APP_DIR="composeApp/build/compose/binaries/main/app"
          APP_NAME=$(ls "$APP_DIR")
          mkdir -p linux-tar
          tar -czf "linux-tar/WeddingClouds-${VER}-linux.tar.gz" -C "$APP_DIR" "$APP_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: composeApp/build/compose/binaries/main/rpm/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: linux-tar/*.tar.gz

  publish-page:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Read version from gradle
        id: ver
        run: |
          VER=$(grep -oP 'const val CURRENT_VERSION = "\K[^"]+' composeApp/src/commonMain/kotlin/com/nxzef/wc/config/AppConfig.kt | head -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: WeddingClouds v${{ steps.ver.outputs.version }}
          body: |
            ## WeddingClouds v${{ steps.ver.outputs.version }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS | `.dmg` |
            | Windows | `.msi` |
            | Linux — Ubuntu/Debian | `.deb` |
            | Linux — Fedora/openSUSE | `.rpm` |
            | Linux — Arch/other | `.tar.gz` (extract and run) |
          files: |
            dist/mac-dmg/*.dmg
            dist/windows-msi/*.msi
            dist/linux-deb/*.deb
            dist/linux-rpm/*.rpm
            dist/linux-tar/*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build download page
        run: |
          mkdir -p docs
          VER="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository }}"

          MAC=$(ls dist/mac-dmg/*.dmg 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WIN=$(ls dist/windows-msi/*.msi 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          DEB=$(ls dist/linux-deb/*.deb 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          RPM=$(ls dist/linux-rpm/*.rpm 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          TAR=$(ls dist/linux-tar/*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          BASE="https://github.com/${REPO}/releases/download/v${VER}"
          MAC_URL="${BASE}/${MAC}"
          WIN_URL="${BASE}/${WIN}"
          DEB_URL="${BASE}/${DEB}"
          RPM_URL="${BASE}/${RPM}"
          TAR_URL="${BASE}/${TAR}"

          cat > docs/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Wedding Clouds — Download</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d14;color:#fff;min-height:100vh}

              .hero{padding:72px 24px 48px;text-align:center;position:relative;overflow:hidden}
              .hero::after{content:'';position:absolute;top:-160px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(233,30,99,.18) 0%,transparent 65%);pointer-events:none}
              .logo-wrap{margin:0 auto 28px;width:72px;height:72px;background:linear-gradient(135deg,#E91E63,#9C27B0);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(233,30,99,.35)}
              h1{font-size:32px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
              .sub{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:20px}
              .ver-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(233,30,99,.12);border:1px solid rgba(233,30,99,.3);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#f48fb1}
              .dot{width:6px;height:6px;background:#E91E63;border-radius:50%;animation:pulse 2s infinite}
              @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

              .section{max-width:480px;margin:0 auto;padding:8px 24px 48px}
              .label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);text-align:center;margin-bottom:16px}

              .btn{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:14px;text-decoration:none;color:#fff;margin-bottom:10px;border:1px solid rgba(255,255,255,.07);transition:transform .18s,box-shadow .18s,border-color .18s}
              .btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:rgba(255,255,255,.14)}
              .btn:active{transform:translateY(-1px)}
              .mac{background:#1c1c1e}
              .win{background:#06295a}

              .icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
              .mac .icon{background:rgba(255,255,255,.08)}
              .win .icon{background:rgba(0,120,212,.35)}
              .info{flex:1;text-align:left}
              .info strong{display:block;font-size:14px;font-weight:600;margin-bottom:2px}
              .info span{font-size:12px;color:rgba(255,255,255,.4)}
              .arrow{color:rgba(255,255,255,.2);font-size:16px;margin-left:4px}

              .linux-group{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:4px;margin-bottom:10px}
              .linux-header{display:flex;align-items:center;gap:10px;padding:12px 16px 8px;font-size:12px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase}
              .lbtn{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;text-decoration:none;color:#fff;margin-bottom:2px;border:none;transition:background .15s}
              .lbtn:hover{background:rgba(255,255,255,.07)}
              .lbtn:last-child{margin-bottom:0}
              .lbtn .icon{width:34px;height:34px;border-radius:8px;font-size:16px;background:rgba(233,84,32,.2)}
              .lbtn .info strong{font-size:13px}
              .lbtn .info span{font-size:11px}

              .guide{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 22px;margin-top:6px}
              .guide p{font-size:12px;color:rgba(255,255,255,.35);line-height:2.1}
              .guide strong{color:rgba(255,255,255,.6);font-weight:600}
              code{background:rgba(255,255,255,.07);border-radius:4px;padding:1px 6px;font-size:11px;font-family:monospace}

              footer{text-align:center;padding:0 24px 40px;font-size:12px;color:rgba(255,255,255,.18)}
              footer a{color:rgba(233,30,99,.6);text-decoration:none}
              footer a:hover{color:#E91E63}
            </style>
          </head>
          <body>

          <div class="hero">
            <div class="logo-wrap">
              <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
                <path d="M7 15c0-2.2 1.8-4 4-4h4l2-4h4l2 4h4c2.2 0 4 1.8 4 4v12c0 2.2-1.8 4-4 4H11c-2.2 0-4-1.8-4-4V15z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="19" cy="21" r="4.5" stroke="white" stroke-width="1.8"/>
                <circle cx="26" cy="15" r="1.4" fill="white"/>
              </svg>
            </div>
            <h1>Wedding Clouds</h1>
            <p class="sub">Photography Business CRM</p>
            <div class="ver-badge"><span class="dot"></span>Version ${VER}</div>
          </div>

          <div class="section">
            <p class="label">Download for your platform</p>

            $([ -n "$MAC" ] && echo "<a href='${MAC_URL}' class='btn mac'><div class='icon'>&#xF8FF;</div><div class='info'><strong>macOS</strong><span>macOS 11 or later &nbsp;&middot;&nbsp; .dmg</span></div><span class='arrow'>&#8595;</span></a>")
            $([ -n "$WIN" ] && echo "<a href='${WIN_URL}' class='btn win'><div class='icon'>&#x229E;</div><div class='info'><strong>Windows</strong><span>Windows 10 or later &nbsp;&middot;&nbsp; .msi</span></div><span class='arrow'>&#8595;</span></a>")

            <div class="linux-group">
              <div class="linux-header">&#x1F427; &nbsp;Linux</div>
              $([ -n "$DEB" ] && echo "<a href='${DEB_URL}' class='lbtn'><div class='icon'>&#x1F4E6;</div><div class='info'><strong>Ubuntu &amp; Debian</strong><span>.deb package</span></div><span class='arrow'>&#8595;</span></a>")
              $([ -n "$RPM" ] && echo "<a href='${RPM_URL}' class='lbtn'><div class='icon'>&#x1F9F2;</div><div class='info'><strong>Fedora &amp; openSUSE</strong><span>.rpm package</span></div><span class='arrow'>&#8595;</span></a>")
              $([ -n "$TAR" ] && echo "<a href='${TAR_URL}' class='lbtn'><div class='icon'>&#x1F5DC;</div><div class='info'><strong>Arch &amp; other</strong><span>.tar.gz — extract and run</span></div><span class='arrow'>&#8595;</span></a>")
            </div>

            <div class="guide">
              <p>
                <strong>macOS</strong> &nbsp;Open DMG &rarr; drag to Applications. If blocked: right-click &rarr; Open &rarr; Open Anyway<br>
                <strong>Windows</strong> &nbsp;Run MSI &rarr; follow installer<br>
                <strong>Ubuntu/Debian</strong> &nbsp;<code>sudo dpkg -i weddingclouds.deb</code><br>
                <strong>Fedora</strong> &nbsp;<code>sudo rpm -i weddingclouds.rpm</code><br>
                <strong>Arch</strong> &nbsp;Extract tar.gz &rarr; run <code>bin/WeddingClouds</code>
              </p>
            </div>
          </div>

          <footer>
            <p>&copy; 2026 The Wedding Clouds &nbsp;&middot;&nbsp; <a href="https://github.com/nxzef/wc/releases">All releases &rarr;</a></p>
          </footer>

          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-server:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: deploy-gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Read version from gradle
        id: ver
        run: |
          VER=$(grep -oP 'const val CURRENT_VERSION = "\K[^"]+' composeApp/src/commonMain/kotlin/com/nxzef/wc/config/AppConfig.kt | head -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build fat JAR
        run: ./gradlew :server:shadowJar --no-daemon

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1055385353237/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@wedding-clouds.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
             --tag asia-south1-docker.pkg.dev/wedding-clouds/wc-repo/wc-server \
             --async \
             .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy wc-server \
            --image asia-south1-docker.pkg.dev/wedding-clouds/wc-repo/wc-server \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2

      - name: Update version in Supabase
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PSQL_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's/jdbc://')
          psql "$PSQL_URL" -c "UPDATE app_config SET value = '${{ steps.ver.outputs.version }}', updated_at = NOW() WHERE key = 'latest_version';"
